type: drupal11
docroot: web
webserver_type: apache-fpm
database:
  type: mariadb
  version: "11.8"
mutagen_enabled: false
use_dns_when_possible: true
additional_fqdns:
  - storybook.varbase.ddev.site
composer_version: "2"
corepack_enable: true
web_environment:
  - "STORYBOOK_SERVER_RENDER_URL=https://${DDEV_PROJECT}.${DDEV_TLD}/storybook/stories/render"
  - "DDEV_PRIMARY_URL=https://${DDEV_PROJECT}.${DDEV_TLD}"
php_version: "8.4"
nodejs_version: "20"
dbimage_extra_packages: [sudo]
webimage_extra_packages:
  - php${DDEV_PHP_VERSION}-yaml
  - xdg-utils
  - pkg-config
  - libpixman-1-dev
  - libcairo2-dev
  - libpango1.0-dev
  - make
web_extra_exposed_ports:
  - name: storybook
    container_port: 6006
    http_port: 6007
    https_port: 6006
web_extra_daemons:
  - name: storybook
    command: "bash -c 'yarn set version berry && yarn install && npx kill-port --port 6006 && npx storybook dev --disable-telemetry -p 6006 -h 0.0.0.0'"
    directory: /var/www/html
hooks:
  post-start:
    - exec: yarn set version berry
    - exec: yarn install

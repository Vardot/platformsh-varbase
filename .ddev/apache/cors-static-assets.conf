# CORS for static assets (fonts/images) consumed by Storybook in local DDEV.
# Loaded by Apache from .ddev/apache as an extra site config.

<IfModule mod_headers.c>
  <FilesMatch "\.(?:css|js|mjs|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|avif|ico)$">
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, OPTIONS"
    Header always set Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Range"
  </FilesMatch>
</IfModule>

# Route Storybook subdomain to the Storybook dev server running in the web container.
# Requires additional_fqdns to include storybook.varbase.ddev.site in .ddev/config.yaml.

<VirtualHost *:80>
    ServerName storybook.varbase.ddev.site

    ProxyPreserveHost On
    ProxyRequests Off

    # Proxy WebSocket upgrades used by Storybook HMR.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:6006/$1 [P,L]

    ProxyPass / http://127.0.0.1:6006/
    ProxyPassReverse / http://127.0.0.1:6006/

    ErrorLog /dev/stdout
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

<VirtualHost *:443>
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/master.crt
    SSLCertificateKeyFile /etc/ssl/certs/master.key

    ServerName storybook.varbase.ddev.site

    ProxyPreserveHost On
    ProxyRequests Off

    # Proxy WebSocket upgrades used by Storybook HMR.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:6006/$1 [P,L]

    ProxyPass / http://127.0.0.1:6006/
    ProxyPassReverse / http://127.0.0.1:6006/

    ErrorLog /dev/stdout
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
